<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>لوحة التحكم - حلقة التميز ١</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
  <style>
    body { margin: 0; padding: 0; background: var(--bg); }
    .admin-layout {
      display: flex;
      min-height: 100vh;
    }
    .admin-sidebar {
      width: 250px;
      background: var(--surface);
      padding: 30px 20px;
      border-left: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }
    .admin-content {
      flex: 1;
      padding: 40px;
      overflow-y: auto;
    }
    .admin-card {
      background: var(--surface);
      padding: 30px;
      border-radius: var(--radius-lg);
      margin-bottom: 30px;
      box-shadow: var(--shadow-sm);
    }
    .admin-title {
      margin-bottom: 25px;
      color: var(--primary-dark);
      border-bottom: 2px solid var(--border);
      padding-bottom: 10px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--text);
    }
    .form-control {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-family: inherit;
      box-sizing: border-box;
      background: var(--bg);
    }
    textarea.form-control {
      resize: vertical;
      min-height: 120px;
    }
    .btn-save {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-weight: bold;
      font-size: 1rem;
      transition: background 0.3s;
    }
    .btn-save:hover {
      background: var(--primary-dark);
    }
    .media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      margin-top: 25px;
    }
    .media-item {
      position: relative;
      border-radius: var(--radius-md);
      overflow: hidden;
      aspect-ratio: 1;
      background: var(--bg);
      border: 1px solid var(--border);
    }
    .media-item img, .media-item video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .delete-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(255, 0, 0, 0.8);
      color: white;
      border: none;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      transition: transform 0.2s;
    }
    .delete-btn:hover {
      transform: scale(1.1);
      background: red;
    }
    .admin-nav {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .admin-nav li {
      margin-bottom: 12px;
    }
    .admin-nav a {
      text-decoration: none;
      color: var(--text);
      display: block;
      padding: 12px 15px;
      border-radius: var(--radius-md);
      transition: all 0.3s;
      font-weight: 600;
    }
    .admin-nav a:hover, .admin-nav a.active {
      background: var(--primary-light);
      color: var(--primary-dark);
    }
    .logout-btn {
      margin-top: 60px;
      color: #d32f2f !important;
      background: #ffebee !important;
    }
    .logout-btn:hover {
      background: #ffcdd2 !important;
    }
    #uploadProgress {
      display: none;
      color: var(--primary);
      font-weight: bold;
      margin-top: 10px;
    }
    /* Hide native app styles we don't want */
    .navbar, .footer { display: none !important; }
  </style>
</head>
<body>
  <div class="admin-layout">
    <div class="admin-sidebar">
      <h3 style="margin-bottom: 40px; color: var(--primary-dark); text-align: center;">🌸 لوحة التحكم</h3>
      <ul class="admin-nav">
        <li><a href="#texts" class="active">تعديل النصوص</a></li>
        <li><a href="#images">إدارة الصور</a></li>
        <li><a href="#videos">إدارة الفيديو</a></li>
        <li><a href="index.html">العودة للموقع ➔</a></li>
        <li><a href="#" id="logoutBtn" class="logout-btn">تسجيل الخروج</a></li>
      </ul>
    </div>
    <div class="admin-content">
      
      <!-- Texts Section -->
      <div id="texts" class="admin-card">
        <h2 class="admin-title">تعديل النصوص الأساسية</h2>
        <div class="form-group">
          <label>كلمة شكر (الفقرة الأولى)</label>
          <textarea id="thanks1" class="form-control" placeholder="كلماتي تعجز أن تعبّر..."></textarea>
        </div>
        <div class="form-group">
          <label>كلمة شكر (الفقرة الثانية)</label>
          <textarea id="thanks2" class="form-control" placeholder="شاهدتُ بأمّ عيني..."></textarea>
        </div>
        <div class="form-group">
          <label>كلمة شكر (الفقرة الثالثة)</label>
          <textarea id="thanks3" class="form-control" placeholder="اليوم تنغلق دفّة فصل..."></textarea>
        </div>
        <button class="btn-save" id="saveTextsBtn">حفظ النصوص ✓</button>
        <span id="saveStatus" style="color: green; margin-right: 15px; display: none;">تم الحفظ بنجاح!</span>
      </div>

      <!-- Images Section -->
      <div id="images" class="admin-card">
        <h2 class="admin-title">إدارة الصور</h2>
        <div class="form-group">
          <label>رفع صور جديدة (يمكنك اختيار عدة صور)</label>
          <input type="file" id="imageUpload" accept="image/*" class="form-control" multiple>
        </div>
        <div class="media-grid" id="adminImageGrid">
          <!-- Dynamically loaded -->
        </div>
      </div>

      <!-- Videos Section -->
      <div id="videos" class="admin-card">
        <h2 class="admin-title">إدارة مقاطع الفيديو</h2>
        <div class="form-group">
          <label>رفع فيديو جديد (يفضل حجم صغير)</label>
          <input type="file" id="videoUpload" accept="video/mp4,video/webm" class="form-control" multiple>
          <div id="uploadProgress">جاري الرفع...</div>
        </div>
        <div class="media-grid" id="adminVideoGrid">
          <!-- Dynamically loaded -->
        </div>
      </div>

    </div>
  </div>

  <script src="db.js"></script>
  <script src="admin.js"></script>
</body>
</html>
