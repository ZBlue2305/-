<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول - لوحة الإدارة</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 40px 30px;
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      text-align: center;
    }
    .login-logo {
      font-size: 2rem;
      margin-bottom: 10px;
    }
    .login-input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-family: inherit;
      box-sizing: border-box;
    }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: 600;
      margin-top: 15px;
      transition: background 0.3s;
    }
    .login-btn:hover {
      background: var(--primary-dark);
    }
    .error-msg {
      color: red;
      display: none;
      margin-top: 15px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="login-container fade-in">
    <div class="login-logo">🌸</div>
    <h2 style="color: var(--primary-dark);">تسجيل الدخول</h2>
    <p style="color: var(--text-light); margin-bottom: 25px;">الرجاء إدخال بيانات الدخول للوصول للوحة التحكم.</p>
    <form id="loginForm">
      <input type="email" id="email" class="login-input" placeholder="البريد الإلكتروني" required>
      <input type="password" id="password" class="login-input" placeholder="كلمة المرور" required>
      <button type="submit" class="login-btn">دخول ✦</button>
      <p class="error-msg" id="errorMsg">البريد الإلكتروني أو كلمة المرور غير صحيحة.</p>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      if (email === 'razy02025@gmail.com' && password === 'dar_aishe2026') {
        localStorage.setItem('admin_auth', 'true');
        window.location.href = 'admin.html';
      } else {
        document.getElementById('errorMsg').style.display = 'block';
      }
    });
  </script>
</body>
</html>
